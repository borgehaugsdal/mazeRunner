<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Challenge</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #maze {
            display: grid;
            grid-template-columns: repeat(20, 20px);
            grid-template-rows: repeat(20, 20px);
            gap: 1px;
        }
        .wall {
            background-color: black;
        }
        .floor {
            background-color: white;
        }
        .player {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }
        .player1 { background-color: red; }
        .player2 { background-color: blue; }
        .player3 { background-color: green; }
        .player4 { background-color: yellow; }
        .player5 { background-color: purple; }
        .player6 { background-color: orange; }
    </style>
</head>
<body>
    <h1>Maze Challenge</h1>
    <div id="maze"></div>
    <script>
        const mazeData = /* Maze data will be injected here */;
        const mazeElement = document.getElementById('maze');

        function renderMaze(maze) {
            mazeElement.innerHTML = '';
            maze.forEach(row => {
                row.forEach(cell => {
                    const cellElement = document.createElement('div');
                    cellElement.className = cell === '#' ? 'wall' : 'floor';
                    mazeElement.appendChild(cellElement);
                });
            });
        }

        function updatePlayers(players) {
            players.forEach(player => {
                const playerElement = document.createElement('div');
                playerElement.className = `player player${player.color}`;
                const position = player.position; // Assuming position is an object { x, y }
                const index = position.y * 20 + position.x; // Assuming 20 columns
                mazeElement.children[index].appendChild(playerElement);
            });
        }

        // WebSocket connection and event handling will go here
    </script>
</body>
</html>
